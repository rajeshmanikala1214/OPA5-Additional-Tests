_schema-version: "3.2"
ID: fioriapp
version: 0.0.1

modules:
  - name: html5module
    type: html5
    path: .
    build-parameters:
      builder: custom
      commands:
        - npm install
        - npm run build
      supported-platforms: []

  - name: html5module_deployer
    type: com.sap.application.content
    path: .
    requires:
      - name: fioriapp_html_repo_host
        parameters:
          content-target: true
    build-parameters:
      build-result: .
      requires:
        - artifacts:
            - HTML5Module-content.zip
          name: html5module
          target-path: .

resources:
  - name: fioriapp_html_repo_runtime
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-runtime

  - name: fioriapp_html_repo_host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-host